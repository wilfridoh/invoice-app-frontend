<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
  <div class="card shadow p-4" style="width: 380px">
    <h4 class="text-center mb-4">InvoiceApp &mdash; Ingresar</h4>

    @if (error) {
      <div class="alert alert-danger">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input
          formControlName="username"
          class="form-control"
          [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
        />
        <div class="invalid-feedback">El usuario es requerido.</div>
      </div>

      <div class="mb-4">
        <label class="form-label">Contrase&ntilde;a</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <div class="invalid-feedback">M&iacute;nimo 6 caracteres.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
